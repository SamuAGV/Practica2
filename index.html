<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSAGV - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h1>NutriSAGV</h1>
            <h3>Clínica de Nutrición</h3>
            <p>Ingrese su nombre para comenzar</p>
            <input type="text" id="nombreNutriologo" placeholder="Nombre del nutriólogo" autocomplete="off">
            <button id="btnLogin" style="background-color: #4CAF50; color: white; border: none; padding: 10px 20px; text-align: center; text-decoration: none; display: inline-block; font-size: 16px; margin: 10px 0; cursor: pointer; border-radius: 5px;">Firmar Entrada</button>
            <div id="errorMsg" class="error"></div>
        </div>
    </div>

    <script type="module">
        import { login } from './js/modules/auth.js';
        document.getElementById('btnLogin').addEventListener('click', login);
        document.getElementById('nombreNutriologo').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
